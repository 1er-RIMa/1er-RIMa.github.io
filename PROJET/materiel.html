<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1er RIMa - Matériel</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- En-tête avec logo et navigation -->
    <header>
        <div class="header-content">
            <img src="assets/img/logo-rima1.png" alt="Logo 1er RIMa" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Accueil</a></li>
                    <li><a href="presentation.html"><i class="fas fa-info-circle"></i> Présentation</a></li>
                    <li><a href="materiel.html" class="active"><i class="fa-solid fa-gears"></i></i> Matériel</a></li>
                    <li><a href="carte.html"><i class="fas fa-map-marked-alt"></i> Carte</a></li>
                    <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                    <li><a href="actualites.html"><i class="fas fa-newspaper"></i> Actualités</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <!-- Section principale avec liste du matériel, formulaire d'ajout et filtres -->
    <main>
        <section class="page-header">
            <h1>Matériel et véhicules</h1>
            <p>Découvrez les équipements et véhicules utilisés par le 1er RIMa.</p>
        </section>

        <section class="materiel-controls">
            <div class="search-filter">
                <input type="text" id="search" placeholder="Rechercher un matériel...">
                <select id="filter-type">
                    <option value="all">Tous les types</option>
                    <option value="véhicule">Véhicules</option>
                    <option value="arme">Armes</option>
                    <option value="équipement">Équipements</option>
                </select>
                <!-- Boutons de tri -->
                <button id="sort-az" class="btn btn-secondary">Trier A-Z</button>
                <button id="sort-za" class="btn btn-secondary">Trier Z-A</button>
            </div>
            <!-- Formulaire d'ajout de matériel -->
            <form id="add-materiel" class="add-form">
                <h2>Ajouter un matériel</h2>
                <input type="text" id="nom" placeholder="Nom" required>
                <input type="text" id="type" placeholder="Type (véhicule/arme/équipement)" required>
                <textarea id="description" placeholder="Description" rows="3"></textarea>
                <input type="text" id="image" placeholder="URL de l'image">
                <button type="submit" class="btn btn-primary">Ajouter</button>
            </form>
        </section>

        <section class="materiel-list">
            <h2>Liste du matériel</h2>
            <div id="materiel-grid"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - 1er RIMa - Tous droits réservés</p>
    </footer>
    <!-- Script pour la gestion du matériel -->
    <script src="assets/js/materiel.js"></script>
</body>

</html>
