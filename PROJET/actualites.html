<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1er RIMa - Actualités</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <!-- En-tête avec logo et navigation -->
        <div class="header-content">
            <img src="assets/img/logo-rima1.png" alt="Logo 1er RIMa" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Accueil</a></li>
                    <li><a href="presentation.html"><i class="fas fa-info-circle"></i> Présentation</a></li>
                    <li><a href="materiel.html"><i class="fa-solid fa-gears"></i> Matériel</a></li>
                    <li><a href="carte.html"><i class="fas fa-map-marked-alt"></i> Carte</a></li>
                    <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                    <li><a href="actualites.html" class="active"><i class="fas fa-newspaper"></i> Actualités</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <h1>Actualités du 1er RIMa</h1>
            <p>Retrouvez les dernières informations et événements du régiment.</p>
        </section>
        <!-- Section principale avec liste des actualités, formulaire d'ajout et filtres -->
        <section class="news-controls">
            <div class="news-filters">
                <select id="news-filter">
                    <option value="all">Toutes les catégories</option>
                    <option value="opérations">Opérations</option>
                    <option value="vie">Vie du régiment</option>
                    <option value="événements">Événements</option>
                </select>
                <input type="text" id="news-search" placeholder="Rechercher une actualité...">
            </div>
            <!-- Formulaire d'ajout d'une actualité -->
            <form id="add-news" class="add-news-form">
                <h2>Ajouter une actualité</h2>
                <input type="text" id="titre" placeholder="Titre" required>
                <select id="categorie" required>
                    <option value="">Catégorie</option>
                    <option value="opérations">Opérations</option>
                    <option value="vie">Vie du régiment</option>
                    <option value="événements">Événements</option>
                </select>
                <textarea id="contenu" placeholder="Contenu" rows="4" required></textarea>
                <input type="text" id="image" placeholder="URL de l'image">
                <button type="submit" class="btn btn-primary">Ajouter</button>
            </form>
        </section>
        <!-- Section de la liste des actualités avec pagination -->
        <section class="news-list">
            <h2>Dernières actualités</h2>
            <div id="news-grid"></div>
            <div id="pagination"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - 1er RIMa - Tous droits réservés</p>
    </footer>
    <!-- Script pour la gestion des actualités -->
    <script src="assets/js/news.js"></script>
</body>

</html>
